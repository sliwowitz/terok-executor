roster_version: 2

kind: tool
label: CodeRabbit
binary: coderabbit

# The CodeRabbit endpoint (app.coderabbit.ai) lives in
# resources/providers/coderabbit.yaml.
# No base_url_env: the CLI has no API endpoint override.  It does honour
# HTTPS_PROXY, but the token broker is a reverse proxy (route-prefix), not a
# forward proxy (CONNECT tunnel).  Phantom tokens cannot reach the upstream
# without vault routing.  Binary not shipped in L1 (runs in a sidecar).
provider:
  default: coderabbit
  credential_type: api_key
  token_env:
    _default: CODERABBIT_API_KEY

sidecar:
  tool_name: coderabbit
  env_map:
    CODERABBIT_API_KEY: key     # inject real key from credential DB

auth:
  host_dir: _coderabbit-config
  container_mount: /home/dev/.coderabbit
  modes: [api_key]
  api_key_hint: "Get your API key from https://app.coderabbit.ai/settings"
