roster_version: 2

kind: native
label: Codex
binary: codex

git_identity:
  name: Codex
  email: noreply@openai.com

headless:
  subcommand: exec
  prompt_flag: ""
  model_flag: "--model"

auto_approve:
  flags: ["--yolo"]

session:
  supports_resume: false

capabilities:
  log_format: plain

# In-container login would taint the host-shared mount and break credential
# containment (terok-ai/terok#873).  Use `terok auth codex` on the host
# instead; the egress firewall blocks the OAuth handshake either way.
wrapper:
  refuse_subcommands: [login, logout]

# The endpoint Codex routes to (upstream, the /backend-api/ → chatgpt.com
# split, token refresh) lives in resources/providers/openai.yaml.
protocol: openai-responses
provider:
  default: openai
  credential_file: auth.json
  credential_type: oauth
  # Codex derives its inference base from the auth mode (codex-rs
  # model_provider_info::to_api_provider): a ChatGPT-subscription token would
  # target https://chatgpt.com/backend-api/codex, an API key
  # https://api.openai.com/v1 — but an explicit ``openai_base_url`` overrides
  # BOTH.  Since terok must override it (to route via the vault rather than
  # straight to a firewalled upstream), the override has to match the mode the
  # user actually authenticated with: ``by_credential_type`` is keyed off the
  # stored credential's type so an OAuth container lands on the ChatGPT backend
  # (a subscription token can't use ``/v1`` — no api.responses.write scope → 401
  # → the blocked auth.openai.com refresh) and an API-key container on ``/v1``.
  # ``chatgpt_base_url`` (common) routes the auth-manager's account calls.
  config_patch:
    file: config.toml
    toml_set:
      chatgpt_base_url: "{vault_url}/backend-api/"
    by_credential_type:
      oauth:
        openai_base_url: "{vault_url}/backend-api/codex"
      api_key:
        openai_base_url: "{vault_url}/v1"
  # Codex itself reads its bearer from ``auth.json`` + the patched
  # ``config.toml``, not from env.  This phantom env var is emitted for
  # env-var-only consumers (e.g. Pi) so any other agent in the same
  # container can route through the vault under OpenAI's standard env-var name.
  token_env:
    _default: OPENAI_API_KEY

auth:
  host_dir: _codex-config
  container_mount: /home/dev/.codex
  modes: [oauth, api_key]
  command: ["setup-codex-auth.sh"]
  banner_hint: |-
    This will set up port forwarding (using socat) and open a browser for authentication.
    After completing authentication, press Ctrl+C to stop the container.
  extra_run_args: ["-p", "127.0.0.1:1455:1455"]
  # Headless hosts: `terok auth codex --device-auth` shows a code + URL to enter
  # on another device, so there is no browser callback (and no port to forward).
  device_auth: true
  api_key_hint: "Get your API key at: https://platform.openai.com/api-keys"

install:
  run_as_root: |
    RUN set -eux; \
        cp /tmp/terok-scripts/terok-codex-acp /usr/local/bin/terok-codex-acp; \
        cp /tmp/terok-scripts/setup-codex-auth.sh /usr/local/bin/setup-codex-auth.sh; \
        cp /tmp/terok-scripts/terok-native-provider /usr/local/bin/terok-native-provider; \
        chmod +x /usr/local/bin/terok-codex-acp \
                 /usr/local/bin/setup-codex-auth.sh \
                 /usr/local/bin/terok-native-provider; \
        ln -sf terok-native-provider /usr/local/bin/codex-provider
  run_as_dev: |
    RUN set -eux; \
        npm install -g @openai/codex; \
        npm cache clean --force

help:
  label: '  \033[36mcodex\033[0m      - OpenAI Codex CLI'
