# Anthropic — the upstream the `claude` agent authenticates to by default.
# Both an OAuth token and an API key are accepted, under *different* wire
# headers, so the vault picks the header per stored credential type at
# request time (the historical `auth_header: dynamic`).

upstream: https://api.anthropic.com

auth:
  oauth:
    header: Authorization
    prefix: "Bearer "
    extra_headers:
      anthropic-beta: oauth-2025-04-20
  api_key:
    header: x-api-key
    prefix: ""

# OAuth token refresh -- endpoint and client_id extracted from Claude Code
# v2.1.86 (cli.js bundle). Scopes match the refresh grant in that version.
# These are undocumented internals and may change with Claude Code releases.
oauth_refresh:
  token_url: https://platform.claude.com/v1/oauth/token
  client_id: 9d1c250a-e61b-44d9-88ed-5944d1962f5e
  scope: "user:profile user:inference user:sessions:claude_code user:mcp_servers user:file_upload"

serves:
  anthropic-messages: ""
