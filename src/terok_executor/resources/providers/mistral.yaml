# Mistral — the upstream the `vibe` agent authenticates to by default.
# OpenAI-compatible chat-completions API.

upstream: https://api.mistral.ai

auth:
  api_key:
    header: Authorization
    prefix: "Bearer "

serves:
  openai-chat: "/v1"
